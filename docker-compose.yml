# WhareScore — Docker Compose (local development)
#
# Connects to your EXISTING PostgreSQL on the host machine.
# All 18.7M+ records in wharescore DB are used directly — no data import needed.
#
# Usage:
#   docker compose up --build
#   Open http://localhost in your browser
#
# To use a containerized PostgreSQL instead (e.g. fresh machine):
#   1. Uncomment the 'postgres' service below
#   2. Change DB_HOST to 'postgres'
#   3. Run: docker compose up --build
#   4. Restore your pg_dump into the container

services:
  # --- Uncomment for containerized PostgreSQL ---
  # postgres:
  #   image: postgis/postgis:17-3.5
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: wharescore
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5433:5432"  # 5433 to avoid conflict with host PG
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 5s
  #     retries: 5

  valhalla:
    restart: unless-stopped
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    volumes:
      - /data/valhalla:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/australia-oceania/new-zealand-latest.osm.pbf
      - use_tiles_ignore_pbf=True
      - build_elevation=True
      - build_admins=True
      - build_time_zones=True
      - force_rebuild=False
      - server_threads=2
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s  # Tile building takes time on first run

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    command: redis-server --requirepass devredis123
    ports:
      - "6380:6379"  # 6380 to avoid conflict with host Redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devredis123", "ping"]
      interval: 5s
      retries: 3

  martin:
    restart: unless-stopped
    image: ghcr.io/maplibre/martin:v0.15.0
    command: --config /config/martin.yaml
    volumes:
      - ./martin.yaml:/config/martin.yaml:ro
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  api:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@${DB_HOST:-host.docker.internal}:5432/wharescore
      REDIS_URL: redis://:devredis123@redis:6379/0
      MBIE_API_KEY: ${MBIE_API_KEY:-}
      LINZ_API_KEY: ${LINZ_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-5-mini}
      VALHALLA_URL: http://valhalla:8002
      METROINFO_API_KEY: ${METROINFO_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost","http://localhost:3000"]'}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-'["localhost","127.0.0.1","nginx","api"]'}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_SINGLE: ${STRIPE_PRICE_SINGLE:-}
      STRIPE_PRICE_PACK3: ${STRIPE_PRICE_PACK3:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_LINZ_API_KEY: ${NEXT_PUBLIC_LINZ_API_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    # Dev only — prod uses host nginx for SSL termination.
    # Start with: docker compose --profile dev up
    profiles: ["dev"]
    restart: unless-stopped
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - martin

# volumes:
#   pgdata:  # Uncomment if using containerized PostgreSQL
