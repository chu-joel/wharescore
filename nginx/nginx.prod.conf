worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/vnd.mapbox-vector-tile
        application/x-protobuf;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=tile_zone:10m rate=60r/s;

    # Proxy cache for tiles
    proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tile_cache:64m max_size=1g inactive=7d;

    # Upstream services
    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3000;
    }

    upstream tiles {
        server martin:3000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/wharescore.australiaeast.cloudapp.azure.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wharescore.australiaeast.cloudapp.azure.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        server_tokens off;
        client_max_body_size 2m;

        # --- API ---
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;

            add_header Cache-Control "no-store" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Health check (no rate limit)
        location = /health {
            proxy_pass http://api;
            access_log off;
        }

        # --- Vector tiles (Martin) ---
        location /tiles/ {
            limit_req zone=tile_zone burst=40 nodelay;

            rewrite ^/tiles/(.*?)(?:\.pbf)?$ /$1 break;
            proxy_pass http://tiles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_cache tile_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=604800";
        }

        # Martin catalog endpoint
        location = /tiles/catalog {
            rewrite ^/tiles/catalog$ /catalog break;
            proxy_pass http://tiles;
        }

        # --- Next.js static assets (long cache) ---
        location /_next/static/ {
            proxy_pass http://web;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # --- Frontend (Next.js) ---
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }
    }
}
