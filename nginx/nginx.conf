worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.mapbox-vector-tile;
    gzip_min_length 256;

    # Upstream services
    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3000;
    }

    upstream tiles {
        server martin:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # --- API ---
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Health check (no /api prefix)
        location = /health {
            proxy_pass http://api;
        }

        # --- Vector tiles (Martin) ---
        location /tiles/ {
            rewrite ^/tiles/(.*?)(?:\.pbf)?$ /$1 break;
            proxy_pass http://tiles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache tile responses aggressively
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=3600";
        }

        # Martin catalog endpoint
        location = /tiles/catalog {
            rewrite ^/tiles/catalog$ /catalog break;
            proxy_pass http://tiles;
        }

        # --- Frontend (Next.js) ---
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Next.js HMR websocket (dev)
        location /_next/webpack-hmr {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
