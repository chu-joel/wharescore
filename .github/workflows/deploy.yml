name: Deploy to Azure VM

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: wharescore
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"
            cd /home/wharescore/app

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Stopping all running services"
            $COMPOSE down --remove-orphans --timeout 15

            echo "==> Pruning old images to free disk space"
            docker image prune -f

            echo "==> Building fresh images"
            $COMPOSE build --no-cache api web

            echo "==> Starting infrastructure (postgres, redis, martin)"
            $COMPOSE up -d postgres redis martin

            echo "==> Waiting for postgres to be healthy"
            for i in $(seq 1 20); do
              if $COMPOSE ps postgres | grep -q healthy; then
                echo "    postgres healthy (attempt $i)"
                break
              fi
              sleep 3
            done

            echo "==> Starting api and web"
            $COMPOSE up -d api web

            echo "==> Waiting for API to be healthy"
            for i in $(seq 1 20); do
              if $COMPOSE ps api | grep -q healthy; then
                echo "    api healthy (attempt $i)"
                break
              fi
              sleep 5
            done

            echo "==> Starting nginx"
            $COMPOSE up -d nginx

            echo "==> Final health check"
            for i in $(seq 1 18); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "==> Deploy successful! Health check passed (attempt $i)"
                exit 0
              fi
              echo "    attempt $i/18 — waiting 5s..."
              sleep 5
            done

            echo "==> Health check FAILED after 90s"
            echo "==> Container status:"
            $COMPOSE ps
            echo "==> Last 100 lines of logs:"
            $COMPOSE logs --tail 100 api web nginx
            exit 1

      - name: Run migrations + load new datasets
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: wharescore
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120m
          script: |
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"
            cd /home/wharescore/app

            echo "==> Running migrations + loading new datasets"
            $COMPOSE exec -T api python -c "
            import sys, glob, psycopg
            from app.services.data_loader import DATA_SOURCES, run_loader, _db_url_to_sync

            conn = psycopg.connect(_db_url_to_sync())
            conn.autocommit = True
            cur = conn.cursor()

            # 1. Run pending SQL migrations
            print('=== Running migrations ===')
            for mf in sorted(glob.glob('migrations/0*.sql')):
                try:
                    with open(mf) as f:
                        cur.execute(f.read())
                    print(f'  OK: {mf}')
                except Exception as e:
                    print(f'  Skip: {mf} — {str(e).split(chr(10))[0][:80]}')

            # 2. Find datasets never loaded (not in data_versions)
            print()
            print('=== Checking for new datasets ===')
            try:
                cur.execute('SELECT source FROM data_versions')
                loaded = {r[0] for r in cur.fetchall()}
            except Exception:
                loaded = set()
            conn.close()

            unloaded = [s.key for s in DATA_SOURCES if s.key not in loaded]
            if not unloaded:
                print('All %d datasets already loaded.' % len(DATA_SOURCES))
                sys.exit(0)

            print('Found %d new datasets to load:' % len(unloaded))
            for k in unloaded:
                print(f'  - {k}')
            print()

            # 3. Load new datasets (sequentially to avoid overloading the VM)
            total_rows = 0
            errors = 0
            for key in unloaded:
                print(f'Loading {key}...')
                result = run_loader(key, lambda msg: print(f'  {msg}'))
                if result.get('error'):
                    print(f'  FAIL: {result[\"error\"][:80]}')
                    errors += 1
                else:
                    print(f'  OK: {result[\"rows\"]:,} rows')
                    total_rows += result['rows']

            print()
            print(f'Done: {total_rows:,} rows loaded, {errors} errors, {len(unloaded)} datasets')
            " 2>&1 | tail -200
            echo "==> Data sync complete"
