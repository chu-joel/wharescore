name: Deploy to Azure VM

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: wharescore
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"
            cd /home/wharescore/app

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Stopping all running services"
            $COMPOSE down --remove-orphans --timeout 15

            echo "==> Pruning old images to free disk space"
            docker image prune -f

            echo "==> Building fresh images"
            $COMPOSE build --no-cache api web

            echo "==> Starting infrastructure (postgres, redis, martin)"
            $COMPOSE up -d postgres redis martin

            echo "==> Waiting for postgres to be healthy"
            for i in $(seq 1 20); do
              if $COMPOSE ps postgres | grep -q healthy; then
                echo "    postgres healthy (attempt $i)"
                break
              fi
              sleep 3
            done

            echo "==> Starting api and web"
            $COMPOSE up -d api web

            echo "==> Waiting for API to be healthy"
            for i in $(seq 1 20); do
              if $COMPOSE ps api | grep -q healthy; then
                echo "    api healthy (attempt $i)"
                break
              fi
              sleep 5
            done

            echo "==> Starting nginx"
            $COMPOSE up -d nginx

            echo "==> Final health check"
            for i in $(seq 1 18); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "==> Deploy successful! Health check passed (attempt $i)"
                exit 0
              fi
              echo "    attempt $i/18 — waiting 5s..."
              sleep 5
            done

            echo "==> Health check FAILED after 90s"
            echo "==> Container status:"
            $COMPOSE ps
            echo "==> Last 100 lines of logs:"
            $COMPOSE logs --tail 100 api web nginx
            exit 1

      - name: Kick off data sync (background on VM)
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: wharescore
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30s
          script: |
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"
            cd /home/wharescore/app

            # Get the running API container ID
            API_CONTAINER=$($COMPOSE ps -q api)
            if [ -z "$API_CONTAINER" ]; then
              echo "==> ERROR: API container not running, skipping data sync"
              exit 1
            fi

            # Run data sync detached inside the container — survives SSH disconnect
            docker exec -d "$API_CONTAINER" python -c "
            import sys, logging
            logging.basicConfig(filename='/tmp/data-sync.log', level=logging.INFO, format='%(asctime)s %(message)s')
            log = logging.getLogger('data-sync')

            from app.services.data_loader import DATA_SOURCES, run_loader, _db_url_to_sync
            import psycopg

            conn = psycopg.connect(_db_url_to_sync())
            try:
                cur = conn.cursor()
                cur.execute('SELECT source FROM data_versions')
                loaded = {r[0] for r in cur.fetchall()}
            except Exception:
                loaded = set()
            finally:
                conn.close()

            unloaded = [s.key for s in DATA_SOURCES if s.key not in loaded]
            if not unloaded:
                log.info(f'All {len(DATA_SOURCES)} datasets already loaded.')
                sys.exit(0)

            log.info(f'Loading {len(unloaded)} new datasets...')
            for key in unloaded:
                try:
                    result = run_loader(key, lambda msg: log.info(f'  [{key}] {msg}'))
                    status = 'OK' if not result.get('error') else f'FAIL: {result[\"error\"][:60]}'
                    log.info(f'  {key}: {status} ({result[\"rows\"]:,} rows)')
                except Exception as e:
                    log.info(f'  {key}: ERROR {e}')
            log.info('Data sync complete.')
            "

            echo "==> Data sync started detached in container $API_CONTAINER"
            echo "==> Monitor with: docker exec $API_CONTAINER cat /tmp/data-sync.log"
            echo "==> Deploy complete"
