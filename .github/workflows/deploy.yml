# ┌─────────────────────────────────────────────────────────────┐
# │  .env.prod is generated from GitHub Secrets on every deploy │
# │  To add/change an env var:                                  │
# │    1. Go to repo Settings > Secrets and variables > Actions │
# │    2. Add or update the secret                              │
# │    3. Add it to the `env:` and `envs:` sections below       │
# │    4. Add the line to the "Writing .env.prod" heredoc       │
# │  DO NOT edit .env.prod on the VM — it will be overwritten   │
# └─────────────────────────────────────────────────────────────┘
name: Deploy to Azure VM

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          # All secrets passed as env vars to the SSH session
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          MBIE_API_KEY: ${{ secrets.MBIE_API_KEY }}
          LINZ_API_KEY: ${{ secrets.LINZ_API_KEY }}
          NEXT_PUBLIC_LINZ_API_KEY: ${{ secrets.LINZ_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          METROINFO_API_KEY: ${{ secrets.METROINFO_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          STRIPE_PRICE_QUICK_SINGLE: ${{ secrets.STRIPE_PRICE_QUICK_SINGLE }}
          STRIPE_PRICE_FULL_SINGLE: ${{ secrets.STRIPE_PRICE_FULL_SINGLE }}
          STRIPE_PRICE_UPGRADE: ${{ secrets.STRIPE_PRICE_UPGRADE }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: wharescore
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: POSTGRES_USER,POSTGRES_PASSWORD,REDIS_PASSWORD,AUTH_SECRET,AUTH_GOOGLE_ID,AUTH_GOOGLE_SECRET,MBIE_API_KEY,LINZ_API_KEY,NEXT_PUBLIC_LINZ_API_KEY,AZURE_OPENAI_ENDPOINT,AZURE_OPENAI_API_KEY,AZURE_OPENAI_DEPLOYMENT,ADMIN_PASSWORD_HASH,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_PRO,STRIPE_PRICE_QUICK_SINGLE,STRIPE_PRICE_FULL_SINGLE,STRIPE_PRICE_UPGRADE,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,NEXT_PUBLIC_GOOGLE_MAPS_KEY,METROINFO_API_KEY,BREVO_API_KEY,AUTH_URL,FRONTEND_URL,CORS_ORIGINS,ALLOWED_HOSTS
          script: |
            set -e
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"
            cd /home/wharescore/app

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env.prod from GitHub Secrets"
            cat > .env.prod <<ENVEOF
POSTGRES_USER=${POSTGRES_USER}
POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
REDIS_PASSWORD=${REDIS_PASSWORD}
AUTH_SECRET=${AUTH_SECRET}
AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
AUTH_URL=${AUTH_URL}
FRONTEND_URL=${FRONTEND_URL}
CORS_ORIGINS=${CORS_ORIGINS}
ALLOWED_HOSTS=${ALLOWED_HOSTS}
MBIE_API_KEY=${MBIE_API_KEY}
LINZ_API_KEY=${LINZ_API_KEY}
NEXT_PUBLIC_LINZ_API_KEY=${NEXT_PUBLIC_LINZ_API_KEY}
AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
STRIPE_PRICE_QUICK_SINGLE=${STRIPE_PRICE_QUICK_SINGLE}
STRIPE_PRICE_FULL_SINGLE=${STRIPE_PRICE_FULL_SINGLE}
STRIPE_PRICE_UPGRADE=${STRIPE_PRICE_UPGRADE}
NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
NEXT_PUBLIC_GOOGLE_MAPS_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_KEY}
METROINFO_API_KEY=${METROINFO_API_KEY}
BREVO_API_KEY=${BREVO_API_KEY}
ENVEOF

            echo "==> Stopping all running services"
            $COMPOSE down --remove-orphans --timeout 15 2>/dev/null || true
            docker rm -f app-postgres-1 app-api-1 app-web-1 app-martin-1 app-valhalla-1 app-redis-1 2>/dev/null || true

            echo "==> Pruning old images to free disk space"
            docker image prune -f

            echo "==> Building fresh images"
            $COMPOSE build --no-cache api web

            echo "==> Starting infrastructure (postgres, redis, martin, valhalla)"
            $COMPOSE up -d postgres redis martin valhalla

            echo "==> Waiting for postgres to be healthy"
            for i in $(seq 1 20); do
              if $COMPOSE ps postgres | grep -q healthy; then
                echo "    postgres healthy (attempt $i)"
                break
              fi
              sleep 3
            done

            echo "==> Starting api and web"
            $COMPOSE up -d api web

            echo "==> Waiting for API to be healthy"
            for i in $(seq 1 20); do
              if $COMPOSE ps api | grep -q healthy; then
                echo "    api healthy (attempt $i)"
                break
              fi
              sleep 5
            done

            echo "==> Restarting host nginx (SSL proxy)"
            sudo systemctl restart nginx

            echo "==> Final health check"
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "==> Deploy successful! Health check passed (attempt $i)"
                exit 0
              fi
              echo "    attempt $i/18 — waiting 5s..."
              sleep 5
            done

            echo "==> Health check FAILED after 90s"
            echo "==> Container status:"
            $COMPOSE ps
            echo "==> Last 100 lines of logs:"
            $COMPOSE logs --tail 100 api web
            exit 1

      - name: Kick off data sync (background on VM)
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: wharescore
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30s
          script: |
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"
            cd /home/wharescore/app

            # Get the running API container ID
            API_CONTAINER=$($COMPOSE ps -q api)
            if [ -z "$API_CONTAINER" ]; then
              echo "==> ERROR: API container not running, skipping data sync"
              exit 1
            fi

            # Run data sync detached inside the container — survives SSH disconnect
            docker exec -d "$API_CONTAINER" python -c "
            import sys, logging
            logging.basicConfig(filename='/tmp/data-sync.log', level=logging.INFO, format='%(asctime)s %(message)s')
            log = logging.getLogger('data-sync')

            from app.services.data_loader import DATA_SOURCES, run_loader, _db_url_to_sync
            import psycopg

            conn = psycopg.connect(_db_url_to_sync())
            try:
                cur = conn.cursor()
                cur.execute('SELECT source FROM data_versions')
                loaded = {r[0] for r in cur.fetchall()}
            except Exception:
                loaded = set()
            finally:
                conn.close()

            # Skip datasets that cause OOM or need API keys
            SKIP = {'auckland_landslide', 'auckland_overland_flow', 'christchurch_gtfs', 'ecan_resource_consents'}
            unloaded = [s.key for s in DATA_SOURCES if s.key not in loaded and s.key not in SKIP]
            if not unloaded:
                log.info(f'All {len(DATA_SOURCES)} datasets already loaded.')
                sys.exit(0)

            log.info(f'Loading {len(unloaded)} new datasets...')
            for key in unloaded:
                try:
                    result = run_loader(key, lambda msg: log.info(f'  [{key}] {msg}'))
                    status = 'OK' if not result.get('error') else f'FAIL: {result[\"error\"][:60]}'
                    log.info(f'  {key}: {status} ({result[\"rows\"]:,} rows)')
                except Exception as e:
                    log.info(f'  {key}: ERROR {e}')
            log.info('Data sync complete.')
            "

            echo "==> Data sync started detached in container $API_CONTAINER"
            echo "==> Monitor with: docker exec $API_CONTAINER cat /tmp/data-sync.log"
            echo "==> Deploy complete"
