# ┌──────────────────────────────────────────────────────────────────┐
# │  Daily data-source freshness check                                │
# │                                                                   │
# │  Hits POST /admin/data-sources/refresh-due once a day. The        │
# │  endpoint walks every DataSource that is "due" per its            │
# │  cadence_class + check_interval (see DATA-LOADERS.md), polls      │
# │  upstream metadata (cheap — ~1KB per source), and triggers a      │
# │  full reload only when upstream has changed. Validation gate      │
# │  rejects implausibly low row counts before the reload commits.    │
# │                                                                   │
# │  Required GitHub secret:                                          │
# │    ADMIN_API_TOKEN — service token for /admin/* endpoints         │
# │                                                                   │
# │  Manual run:                                                      │
# │    Actions → "Daily data-source freshness check" → "Run workflow" │
# │    (use dry_run=true the first time to verify classifications)    │
# └──────────────────────────────────────────────────────────────────┘
name: Daily data-source freshness check

on:
  schedule:
    # 16:00 UTC = 04:00 NZST (overnight, before traffic peaks)
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max number of due sources to process this run"
        required: false
        default: "10"
      dry_run:
        description: "Check freshness only — don't trigger reloads"
        required: false
        type: boolean
        default: false

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh-due:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-due endpoint
        env:
          API_BASE: https://wharescore.co.nz
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          LIMIT: ${{ github.event.inputs.limit || '10' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::ADMIN_API_TOKEN secret is not set — configure it in repo Settings → Secrets → Actions before this workflow can run."
            exit 1
          fi
          echo "Hitting ${API_BASE}/api/v1/admin/data-sources/refresh-due (limit=${LIMIT}, dry_run=${DRY_RUN})..."
          # The endpoint is synchronous when dry_run=true (cheap freshness
          # checks, finishes in seconds) and fire-and-forget when
          # dry_run=false (kicks off a background task; returns a job_id
          # immediately so nginx doesn't 504 on long bulk reloads).
          # 60s timeout is plenty for either path.
          #
          # We capture both body + HTTP code so we can handle 409 ("a load
          # is in progress") gracefully — that's an expected condition
          # (operator triggered a parallel load) not a workflow failure.
          # Drop --fail-with-body so curl returns the body even on 4xx.
          http=$(curl --silent --show-error \
            --max-time 60 \
            -X POST \
            -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_BASE}/api/v1/admin/data-sources/refresh-due?limit=${LIMIT}&dry_run=${DRY_RUN}")
          code=$(echo "$http" | sed -n 's/^HTTP_CODE://p' | tail -1)
          response=$(echo "$http" | sed '$d')

          if [ "$code" = "409" ]; then
            echo "Skipped: another data load is already in progress (409)."
            echo "$response" | jq -r '.active // empty | "Active job: \(.source // "?") (\(.status // "?"))"'
            {
              echo "## Daily refresh — $(date -u +%Y-%m-%d)"
              echo ""
              echo "**Skipped** — another data load was already in progress (409). Will try again tomorrow."
              echo ""
              echo "$response" | jq -r '.active // empty | "Active: `\(.source // "?")` (status: `\(.status // "?")`)"'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$code" != "200" ]; then
            echo "::error::Unexpected HTTP $code from refresh-due endpoint"
            echo "$response"
            exit 1
          fi

          mode=$(echo "$response" | jq -r '.dry_run')
          if [ "$mode" = "true" ]; then
            # ── Sync dry-run response (.results[] populated) ─────────────
            echo "$response" | jq -r '
              "Checked \(.checked) sources (limit \(.limit), dry_run=\(.dry_run))",
              "",
              (.results[] | "  \(.action | ascii_upcase): \(.source_key)  —  \(.reason // "")")
            '
            {
              echo "## Daily refresh dry-run — $(date -u +%Y-%m-%d)"
              echo ""
              echo "$response" | jq -r '
                "Checked **\(.checked)** sources (limit \(.limit))",
                "",
                "| Source | Action | Reason |",
                "|---|---|---|",
                (.results[] | "| \(.source_key) | \(.action) | \(.reason // "") |")
              '
            } >> "$GITHUB_STEP_SUMMARY"
            # Dry-run never fails — it only polls upstream metadata.
            exit 0
          fi

          # ── Async real-run response (.job_id + .due_keys) ──────────────
          # The actual reloads run in a background task on the server.
          # Per-source outcomes land in data_source_health; we don't wait
          # for them here. A separate observability path (admin dashboard
          # or follow-up workflow) surfaces stuck/failed sources.
          echo "$response" | jq -r '
            "Kicked off \(.due_count) sources (limit \(.limit))",
            "  job_id: \(.job_id)",
            "",
            "Sources due:",
            (.due_keys[]? // empty | "  - \(.)")
          '
          {
            echo "## Daily refresh — $(date -u +%Y-%m-%d)"
            echo ""
            echo "$response" | jq -r '
              "Kicked off **\(.due_count)** sources (limit \(.limit), job_id \(.job_id))",
              "",
              "Per-source outcomes land in `data_source_health`. Inspect:",
              "",
              "    GET /api/v1/admin/data-sources/health?only_problems=true",
              "",
              "Sources due in this run:",
              "",
              (.due_keys[]? // empty | "- " + .)
            '
          } >> "$GITHUB_STEP_SUMMARY"
