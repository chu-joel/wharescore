# ┌──────────────────────────────────────────────────────────────────┐
# │  Daily data-source freshness check                                │
# │                                                                   │
# │  Hits POST /admin/data-sources/refresh-due once a day. The        │
# │  endpoint walks every DataSource that is "due" per its            │
# │  cadence_class + check_interval (see DATA-LOADERS.md), polls      │
# │  upstream metadata (cheap — ~1KB per source), and triggers a      │
# │  full reload only when upstream has changed. Validation gate      │
# │  rejects implausibly low row counts before the reload commits.    │
# │                                                                   │
# │  Required GitHub secret:                                          │
# │    ADMIN_API_TOKEN — service token for /admin/* endpoints         │
# │                                                                   │
# │  Manual run:                                                      │
# │    Actions → "Daily data-source freshness check" → "Run workflow" │
# │    (use dry_run=true the first time to verify classifications)    │
# └──────────────────────────────────────────────────────────────────┘
name: Daily data-source freshness check

on:
  schedule:
    # 16:00 UTC = 04:00 NZST (overnight, before traffic peaks)
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max number of due sources to process this run"
        required: false
        default: "10"
      dry_run:
        description: "Check freshness only — don't trigger reloads"
        required: false
        type: boolean
        default: false

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh-due:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-due endpoint
        env:
          API_BASE: https://wharescore.co.nz
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          LIMIT: ${{ github.event.inputs.limit || '10' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::ADMIN_API_TOKEN secret is not set — configure it in repo Settings → Secrets → Actions before this workflow can run."
            exit 1
          fi
          echo "Hitting ${API_BASE}/admin/data-sources/refresh-due (limit=${LIMIT}, dry_run=${DRY_RUN})..."
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 1800 \
            -X POST \
            -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_BASE}/admin/data-sources/refresh-due?limit=${LIMIT}&dry_run=${DRY_RUN}")
          echo "$response" | jq -r '
            "Checked \(.checked) sources (limit \(.limit), dry_run=\(.dry_run))",
            "",
            (.results[] | "  \(.action | ascii_upcase): \(.source_key)  —  \(.reason // "")  \(if .rows then "(\(.rows) rows)" else "" end)\(if .error then "  ERROR: \(.error)" else "" end)")
          '

          # Surface failures + gate-blocks into the GitHub Actions summary
          # so we don't have to dig into logs.
          {
            echo "## Daily refresh — $(date -u +%Y-%m-%d)"
            echo ""
            echo "$response" | jq -r '
              "Checked **\(.checked)** sources (limit \(.limit), dry_run=\(.dry_run))",
              "",
              "| Source | Action | Rows | Reason / Error |",
              "|---|---|---|---|",
              (.results[] | "| \(.source_key) | \(.action) | \(.rows // "-") | \(.error // .reason // "") |")
            '
          } >> "$GITHUB_STEP_SUMMARY"

          # Exit 1 if any source was blocked-by-gate or failed — keeps the
          # workflow red until someone investigates.
          problems=$(echo "$response" | jq '[.results[] | select(.action == "blocked-by-gate" or .action == "failed")] | length')
          if [ "$problems" != "0" ]; then
            echo "::warning::${problems} source(s) blocked-by-gate or failed — see summary."
            exit 1
          fi
