# WhareScore — PostgreSQL config for Azure B2ms (2 vCPU, 8GB RAM)
# Tuned for PostGIS workload with 18.7M rows + GIST indexes

# Connection
listen_addresses = '*'
max_connections = 100
port = 5432

# Memory — allocate ~3GB to Postgres, leave ~5GB for other services + OS
shared_buffers = 2GB
effective_cache_size = 4GB
work_mem = 64MB
maintenance_work_mem = 512MB
wal_buffers = 64MB

# WAL
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# Planner — SSD optimized
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 500

# Parallel query (2 vCPU)
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_worker_processes = 4

# Logging
log_min_duration_statement = 500
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'Pacific/Auckland'

# Locale
timezone = 'Pacific/Auckland'
lc_messages = 'en_US.utf8'
