# WhareScore — PostgreSQL config for Azure B4ms (4 vCPU, 16GB RAM)
# Tuned for PostGIS workload with 18.7M rows + GIST indexes

# Connection
listen_addresses = '*'
max_connections = 150
port = 5432

# Memory — allocate ~6GB to Postgres, leave ~10GB for other services + OS
shared_buffers = 4GB
effective_cache_size = 8GB
work_mem = 128MB
maintenance_work_mem = 1GB
wal_buffers = 64MB

# WAL
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# Planner — SSD optimized
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 500

# Parallel query (4 vCPU)
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 8

# Logging
log_min_duration_statement = 500
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'Pacific/Auckland'

# Locale
timezone = 'Pacific/Auckland'
lc_messages = 'en_US.utf8'
