# WhareScore — Docker Compose (Production)
#
# All services run on a single Azure B2ms VM (2 vCPU, 8GB RAM).
# PostgreSQL data lives on a mounted data disk (/data/postgres).
#
# First deploy:
#   1. Copy this file + .env.prod + nginx/ + backend/ + frontend/ to the VM
#   2. Create .env.prod with production secrets
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. Restore pg_dump (see AZURE-HOSTING-PLAN.md §6)
#
# Updates:
#   docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

services:
  postgres:
    image: postgis/postgis:17-3.5
    mem_limit: 3g
    memswap_limit: 4g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: wharescore
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/custom.conf:ro
    command: postgres -c config_file=/etc/postgresql/custom.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d wharescore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports exposed — only accessible via Docker network
    networks:
      - internal

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    mem_limit: 1g
    memswap_limit: 1500m
    volumes:
      - /data/valhalla:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/australia-oceania/new-zealand-latest.osm.pbf
      - use_tiles_ignore_pbf=True
      - build_elevation=True
      - build_admins=True
      - build_time_zones=True
      - force_rebuild=False
      - server_threads=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 3
    networks:
      - internal

  martin:
    image: ghcr.io/maplibre/martin:v0.15.0
    mem_limit: 256m
    command: --auto-bounds skip postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/wharescore
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    mem_limit: 2g
    memswap_limit: 3g
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/wharescore?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MBIE_API_KEY: ${MBIE_API_KEY:-}
      LINZ_API_KEY: ${LINZ_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-5-mini}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["*"]}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_SINGLE: ${STRIPE_PRICE_SINGLE:-}
      STRIPE_PRICE_PACK3: ${STRIPE_PRICE_PACK3:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_QUICK_SINGLE: ${STRIPE_PRICE_QUICK_SINGLE:-}
      STRIPE_PRICE_FULL_SINGLE: ${STRIPE_PRICE_FULL_SINGLE:-}
      STRIPE_PRICE_UPGRADE: ${STRIPE_PRICE_UPGRADE:-}
      STRIPE_PRICE_PRO_EXTRA: ${STRIPE_PRICE_PRO_EXTRA:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://wharescore.co.nz}
      VALHALLA_URL: http://valhalla:8002
      METROINFO_API_KEY: ${METROINFO_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      ENVIRONMENT: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LINZ_API_KEY: ${NEXT_PUBLIC_LINZ_API_KEY:-}
    mem_limit: 512m
    memswap_limit: 768m
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL:-https://wharescore.australiaeast.cloudapp.azure.com}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    depends_on:
      - api
      - web
      - martin
    networks:
      - internal

networks:
  internal:
    driver: bridge
